<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カリドメ - 代理の日程調整を、仮押さえから確定まで</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* トークン: 墨 #22242C / 白練 #F6F5F0 / 朱肉 #B93A2B / 松葉 #2F6B4F / 薄鼠 #DAD7CF */
:root {
  --ink:#22242C; --paper:#F6F5F0; --card:#FFF; --vermilion:#B93A2B;
  --pine:#2F6B4F; --line:#DAD7CF; --muted:#7A7870; --busy:#E7E4DC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;font-size:14px;line-height:1.7}
.wrap{max-width:560px;margin:0 auto;padding:16px 16px 60px}
.app-header{display:flex;justify-content:space-between;align-items:center;padding:6px 0 12px}
.brand{display:flex;align-items:center;gap:9px}
.brand-stamp{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border:2.5px solid var(--vermilion);color:var(--vermilion);font-weight:700;font-size:16px;transform:rotate(-6deg);border-radius:4px;font-family:"Yu Mincho","Hiragino Mincho ProN",serif}
.brand-name{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:20px;font-weight:600;letter-spacing:.12em}
.tabs{display:flex;border-bottom:1px solid var(--line);gap:4px}
.tab{background:none;border:none;cursor:pointer;padding:9px 12px;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;font-family:inherit}
.tab.active{color:var(--ink);font-weight:700;border-bottom-color:var(--vermilion)}
.tab:focus-visible{outline:2px solid var(--vermilion);outline-offset:2px}
.count-badge{background:var(--vermilion);color:#fff;border-radius:9px;font-size:11px;padding:1px 7px;margin-left:2px}
.view{padding:14px 0}
.field-row{display:flex;gap:10px}
.field{display:block;flex:1;margin-bottom:12px}
.field-narrow{flex:0 0 100px}
.field-label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
select,input[type=text],textarea{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--ink);font-size:14px;font-family:inherit}
select:focus,input:focus,textarea:focus{outline:2px solid var(--vermilion);outline-offset:1px}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin:4px 0 8px}
.week-label{font-size:13px;font-weight:700;letter-spacing:.05em}
.grid{display:grid;grid-template-columns:42px repeat(5,1fr);border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--card);user-select:none}
.grid .head{font-size:11px;text-align:center;padding:6px 0;background:var(--paper);border-bottom:1px solid var(--line);color:var(--muted);font-weight:700}
.grid .head.today{color:var(--vermilion)}
.grid .time-label{font-size:10px;color:var(--muted);text-align:right;padding:0 5px 0 0;border-top:1px solid var(--line);background:var(--paper)}
.grid .cell{height:19px;border-top:1px solid #F0EEE8;border-left:1px solid #F0EEE8;cursor:pointer}
.grid .cell:hover{background:#FBEAE7}
.grid .cell.busy{background:var(--busy);cursor:not-allowed}
.grid .cell.busy:hover{background:var(--busy)}
.grid .cell.picked{background:var(--vermilion)}
.grid .cell.past{background:repeating-linear-gradient(45deg,#F2F0EA,#F2F0EA 3px,#EAE8E1 3px,#EAE8E1 6px);cursor:not-allowed}
.grid-hint{font-size:11px;color:var(--muted);margin:6px 0 10px}
.selected-list{margin-bottom:10px;min-height:4px}
.selected-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--vermilion);color:var(--vermilion);border-radius:15px;padding:3px 11px;font-size:12px;margin:0 6px 6px 0}
.selected-chip button{border:none;background:none;color:var(--vermilion);cursor:pointer;font-size:14px;padding:0}
.primary-btn{width:100%;padding:12px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.primary-btn:disabled{background:#B9B7B0;cursor:not-allowed}
.primary-btn:not(:disabled):hover{background:#000}
.ghost-btn{background:none;border:1px solid var(--line);border-radius:7px;padding:6px 12px;font-size:13px;color:var(--ink);cursor:pointer;font-family:inherit}
.ghost-btn:hover{border-color:var(--ink)}
.adj-card{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:12px}
.adj-head{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.stamp{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;font-size:12px;font-weight:700;border:1.5px solid;border-radius:3px;transform:rotate(-6deg);font-family:"Yu Mincho",serif;flex:none}
.stamp-karin{border-color:var(--vermilion);color:var(--vermilion)}
.adj-title{font-weight:700;font-size:14px;flex:1}
.adj-cal{font-size:11px;color:var(--muted);font-weight:400}
.cand-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:1px dashed var(--line);font-size:13px}
.cand-row .confirm-btn{border:1px solid var(--pine);color:var(--pine);background:none;border-radius:6px;padding:3px 11px;font-size:12px;cursor:pointer;font-family:inherit}
.cand-row .confirm-btn:hover{background:var(--pine);color:#fff}
.adj-actions{margin-top:8px}
.danger-link{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;font-family:inherit}
.danger-link:hover{color:var(--vermilion)}
.empty-msg{text-align:center;color:var(--muted);font-size:13px;padding:36px 0}
.modal{position:fixed;inset:0;background:rgba(34,36,44,.45);display:flex;align-items:center;justify-content:center;padding:16px;z-index:40}
.modal-card{background:var(--card);border-radius:12px;padding:18px;width:100%;max-width:520px}
.modal-title{font-size:16px;display:flex;align-items:center;gap:9px;margin-bottom:5px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:10px}
.modal-actions{display:flex;gap:9px;margin-top:12px}
.modal-actions .primary-btn{flex:1}
textarea{resize:vertical;font-size:13px;line-height:1.8}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:50}
.hero{padding:34px 0 20px;text-align:center}
.hero h1{font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:22px;letter-spacing:.06em;margin-bottom:10px}
.hero p{color:var(--muted);font-size:13px;margin-bottom:22px}
.hero .primary-btn{max-width:300px}
.privacy-note{font-size:11px;color:var(--muted);margin-top:14px}
@media(prefers-reduced-motion:no-preference){.toast{animation:pop .18s ease-out}@keyframes pop{from{opacity:0;transform:translate(-50%,6px)}}}
@media(max-width:420px){.grid .cell{height:17px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="app-header">
    <div class="brand"><span class="brand-stamp">仮</span><span class="brand-name">カリドメ</span></div>
    <button id="signoutBtn" class="ghost-btn" hidden>切断</button>
  </header>

  <!-- ログイン前 -->
  <section id="hero" class="hero">
    <h1>上司の日程、代理でピッと仮押さえ。</h1>
    <p>候補をタップ → 仮押さえ → 敬語メール文をコピペ。<br>確定したら残りの仮予定は自動でリリースされます。</p>
    <button id="signinBtn" class="primary-btn">Googleカレンダーに接続して始める</button>
    <p class="privacy-note">カレンダーの情報はこのブラウザとGoogleの間だけで処理され、<br>外部サーバーには一切送信・保存されません。</p>
  </section>

  <!-- アプリ本体 -->
  <div id="app" hidden>
    <nav class="tabs">
      <button class="tab active" data-view="pick">候補を選ぶ</button>
      <button class="tab" data-view="list">調整中 <span id="pendingCount" class="count-badge" hidden>0</span></button>
    </nav>

    <section id="view-pick" class="view">
      <div class="field-row">
        <label class="field"><span class="field-label">誰の予定?(編集権限のあるカレンダー)</span>
          <select id="calendarSelect"></select></label>
        <label class="field field-narrow"><span class="field-label">所要時間</span>
          <select id="durationSelect"><option value="30">30分</option><option value="60" selected>60分</option><option value="90">90分</option></select></label>
      </div>
      <div class="week-nav">
        <button id="prevWeek" class="ghost-btn" aria-label="前の週">‹ 前週</button>
        <span id="weekLabel" class="week-label"></span>
        <button id="nextWeek" class="ghost-btn" aria-label="次の週">翌週 ›</button>
      </div>
      <div id="grid" class="grid" aria-label="空き時間グリッド"></div>
      <p class="grid-hint">グレー=埋まっている枠。空き枠をタップすると候補になります(最大5件)。</p>
      <div id="selectedList" class="selected-list"></div>
      <label class="field"><span class="field-label">案件名(仮押さえ予定のタイトルになります)</span>
        <input id="titleInput" type="text" placeholder="例: ○○様 お打ち合わせ"></label>
      <button id="createBtn" class="primary-btn" disabled>仮押さえを作成してメール文を出す</button>
    </section>

    <section id="view-list" class="view" hidden>
      <div id="adjustments"></div>
      <p id="emptyMsg" class="empty-msg">調整中の案件はありません。<br>「候補を選ぶ」から仮押さえを作成できます。</p>
    </section>
  </div>

  <div id="textModal" class="modal" hidden>
    <div class="modal-card">
      <h2 class="modal-title"><span class="stamp stamp-karin">仮</span>仮押さえしました</h2>
      <p class="modal-sub">下記をメールに貼り付けてください。返事が来たら「調整中」タブで確定を。</p>
      <textarea id="mailText" rows="11"></textarea>
      <div class="modal-actions">
        <button id="copyBtn" class="primary-btn">コピーする</button>
        <button id="closeModal" class="ghost-btn">閉じる</button>
      </div>
    </div>
  </div>
  <div id="toast" class="toast" hidden></div>
</div>

<script>
/* ================================================================
   カリドメ Web版 v0.2 - 完全クライアントサイド。
   ▼▼ ここだけ差し替え(Google CloudのOAuthクライアントID) ▼▼ */
const CLIENT_ID = "ここに貼る.apps.googleusercontent.com";
/* ================================================================ */

const API = "https://www.googleapis.com/calendar/v3";
const SCOPES = "https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly";
const DAY_START = 8, DAY_END = 20, SLOT_MIN = 30;

let tokenClient = null, token = null;
let calendars = [], weekOffset = 0, busyRanges = [], picked = [];
const $ = (id) => document.getElementById(id);

/* ---------- 認証 (Google Identity Services) ---------- */
function requestToken(prompt) {
  return new Promise((resolve, reject) => {
    tokenClient.callback = (resp) => resp.error ? reject(resp) : resolve(resp.access_token);
    tokenClient.requestAccessToken({ prompt });
  });
}

window.addEventListener("load", () => {
  const boot = setInterval(() => {
    if (window.google?.accounts?.oauth2) {
      clearInterval(boot);
      tokenClient = google.accounts.oauth2.initTokenClient({ client_id: CLIENT_ID, scope: SCOPES, callback: () => {} });
    }
  }, 100);
});

$("signinBtn").addEventListener("click", async () => {
  try {
    token = await requestToken("consent");
    await enterApp();
  } catch (e) {
    toast("接続に失敗しました。クライアントIDと承認済みオリジンの設定を確認してください。");
  }
});
$("signoutBtn").addEventListener("click", () => {
  google.accounts.oauth2.revoke(token, () => {});
  token = null;
  $("app").hidden = true; $("hero").hidden = false; $("signoutBtn").hidden = true;
});

async function enterApp() {
  $("hero").hidden = true; $("app").hidden = false; $("signoutBtn").hidden = false;
  await loadCalendars();
  await refreshGrid();
  renderAdjustments();
}

async function api(path, options = {}) {
  const res = await fetch(`${API}${path}`, {
    ...options,
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json", ...(options.headers || {}) },
  });
  if (res.status === 401) {
    token = await requestToken("");  // サイレント再取得
    return api(path, options);
  }
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.status === 204 ? null : res.json();
}

/* ---------- カレンダー ---------- */
async function loadCalendars() {
  const data = await api("/users/me/calendarList");
  calendars = data.items.filter((c) => ["owner", "writer"].includes(c.accessRole));
  const sel = $("calendarSelect");
  sel.innerHTML = "";
  const saved = localStorage.getItem("kd_lastCalendar");
  for (const c of calendars) {
    const opt = document.createElement("option");
    opt.value = c.id;
    opt.textContent = c.primary ? `自分(${c.summary})` : c.summary;
    if (c.id === saved) opt.selected = true;
    sel.appendChild(opt);
  }
}

function weekDates() {
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay() + 6) % 7) + weekOffset * 7);
  mon.setHours(0, 0, 0, 0);
  return [...Array(5)].map((_, i) => { const d = new Date(mon); d.setDate(mon.getDate() + i); return d; });
}

async function refreshGrid() {
  const days = weekDates();
  const calId = $("calendarSelect").value;
  if (!calId) return;
  localStorage.setItem("kd_lastCalendar", calId);
  const timeMin = new Date(days[0]);
  const timeMax = new Date(days[4]); timeMax.setHours(23, 59, 59);
  const fb = await api("/freeBusy", {
    method: "POST",
    body: JSON.stringify({ timeMin: timeMin.toISOString(), timeMax: timeMax.toISOString(), items: [{ id: calId }] }),
  });
  busyRanges = (fb.calendars[calId]?.busy || []).map((b) => ({ start: new Date(b.start), end: new Date(b.end) }));
  $("weekLabel").textContent = `${days[0].getMonth() + 1}/${days[0].getDate()} 〜 ${days[4].getMonth() + 1}/${days[4].getDate()}`;
  renderGrid(days);
}

const isBusy = (s, e) => busyRanges.some((b) => s < b.end && e > b.start);
const isPicked = (s) => picked.some((p) => p.start.getTime() === s.getTime());

function renderGrid(days) {
  const grid = $("grid");
  grid.innerHTML = "";
  const youbi = ["月", "火", "水", "木", "金"];
  const today = new Date(); today.setHours(0, 0, 0, 0);
  grid.appendChild(el("div", "head", ""));
  days.forEach((d, i) => {
    const h = el("div", "head", `${youbi[i]} ${d.getDate()}`);
    if (d.getTime() === today.getTime()) h.classList.add("today");
    grid.appendChild(h);
  });
  const now = new Date();
  for (let h = DAY_START; h < DAY_END; h++) {
    for (let half = 0; half < 2; half++) {
      grid.appendChild(el("div", "time-label", half === 0 ? `${h}:00` : ""));
      for (const d of days) {
        const s = new Date(d); s.setHours(h, half * 30, 0, 0);
        const e = new Date(s.getTime() + SLOT_MIN * 60000);
        const cell = el("div", "cell", "");
        if (s < now) cell.classList.add("past");
        else if (isBusy(s, e)) cell.classList.add("busy");
        else {
          if (isPicked(s)) cell.classList.add("picked");
          cell.addEventListener("click", () => togglePick(s));
        }
        grid.appendChild(cell);
      }
    }
  }
}

function togglePick(start) {
  const dur = Number($("durationSelect").value);
  const end = new Date(start.getTime() + dur * 60000);
  const idx = picked.findIndex((p) => p.start.getTime() === start.getTime());
  if (idx >= 0) picked.splice(idx, 1);
  else {
    if (isBusy(start, end)) { toast("所要時間ぶんの空きがありません"); return; }
    if (picked.length >= 5) { toast("候補は5件までにしましょう"); return; }
    picked.push({ start, end });
    picked.sort((a, b) => a.start - b.start);
  }
  refreshPickedUI();
}

function refreshPickedUI() {
  renderGrid(weekDates());
  const list = $("selectedList");
  list.innerHTML = "";
  picked.forEach((p, i) => {
    const chip = el("span", "selected-chip", `${p.start.getMonth() + 1}/${p.start.getDate()} ${fmtTime(p.start)}〜${fmtTime(p.end)}`);
    const x = document.createElement("button");
    x.textContent = "×"; x.setAttribute("aria-label", "候補を外す");
    x.addEventListener("click", () => { picked.splice(i, 1); refreshPickedUI(); });
    chip.appendChild(x);
    list.appendChild(chip);
  });
  $("createBtn").disabled = picked.length === 0;
}

/* ---------- 仮押さえ作成 ---------- */
$("createBtn").addEventListener("click", async () => {
  const calId = $("calendarSelect").value;
  const calName = $("calendarSelect").selectedOptions[0].textContent;
  const title = $("titleInput").value.trim() || "お打ち合わせ";
  const adjId = "kd_" + Date.now();
  $("createBtn").disabled = true;
  $("createBtn").textContent = "作成中…";
  try {
    const candidates = [];
    for (const p of picked) {
      const ev = await api(`/calendars/${encodeURIComponent(calId)}/events`, {
        method: "POST",
        body: JSON.stringify({
          summary: `【仮】${title}`,
          start: { dateTime: p.start.toISOString() },
          end: { dateTime: p.end.toISOString() },
          extendedProperties: { private: { karidome: adjId } },
        }),
      });
      candidates.push({ eventId: ev.id, start: p.start.toISOString(), end: p.end.toISOString() });
    }
    const adjustments = loadAdj();
    adjustments.unshift({ id: adjId, title, calendarId: calId, calendarName: calName, candidates, createdAt: Date.now() });
    saveAdj(adjustments);
    $("mailText").value = buildMail(title, picked);
    $("textModal").hidden = false;
    picked = [];
    refreshPickedUI();
    await refreshGrid();
    renderAdjustments();
  } catch (e) {
    toast("作成に失敗しました: " + e.message);
  } finally {
    $("createBtn").textContent = "仮押さえを作成してメール文を出す";
  }
});

function buildMail(title, slots) {
  const marks = ["①", "②", "③", "④", "⑤"];
  const lines = slots.map((p, i) => `${marks[i]}${fmtLong(p.start)}〜${fmtTime(p.end)}`).join("\n");
  return `お世話になっております。

「${title}」の候補日程をお送りいたします。
下記よりご都合のよろしい日時をお知らせいただけますと幸いです。

${lines}

いずれも難しい場合は、別途候補を再送いたします。
ご多用のところ恐れ入りますが、ご検討のほどよろしくお願いいたします。`;
}

/* ---------- 調整中・確定・リリース ---------- */
const loadAdj = () => JSON.parse(localStorage.getItem("kd_adjustments") || "[]");
const saveAdj = (a) => localStorage.setItem("kd_adjustments", JSON.stringify(a));

function renderAdjustments() {
  const adjustments = loadAdj();
  const wrap = $("adjustments");
  wrap.innerHTML = "";
  $("emptyMsg").hidden = adjustments.length > 0;
  $("pendingCount").hidden = adjustments.length === 0;
  $("pendingCount").textContent = adjustments.length;
  for (const adj of adjustments) {
    const card = el("div", "adj-card", "");
    const head = el("div", "adj-head", "");
    head.appendChild(el("span", "stamp stamp-karin", "仮"));
    const t = el("span", "adj-title", adj.title);
    t.appendChild(el("div", "adj-cal", adj.calendarName));
    head.appendChild(t);
    card.appendChild(head);
    adj.candidates.forEach((c, i) => {
      const row = el("div", "cand-row", "");
      row.appendChild(el("span", "", `${fmtLong(new Date(c.start))}〜${fmtTime(new Date(c.end))}`));
      const btn = el("button", "confirm-btn", "この日程で確定");
      btn.addEventListener("click", () => confirmSlot(adj, i));
      row.appendChild(btn);
      card.appendChild(row);
    });
    const actions = el("div", "adj-actions", "");
    const cancel = el("button", "danger-link", "この調整を取り消す(仮押さえを全て削除)");
    cancel.addEventListener("click", () => cancelAdj(adj));
    actions.appendChild(cancel);
    card.appendChild(actions);
    wrap.appendChild(card);
  }
}

async function confirmSlot(adj, keepIndex) {
  try {
    for (let i = 0; i < adj.candidates.length; i++) {
      const c = adj.candidates[i];
      const path = `/calendars/${encodeURIComponent(adj.calendarId)}/events/${c.eventId}`;
      if (i === keepIndex) await api(path, { method: "PATCH", body: JSON.stringify({ summary: adj.title }) });
      else await api(path, { method: "DELETE" });
    }
    saveAdj(loadAdj().filter((a) => a.id !== adj.id));
    toast("確定しました。残りの仮押さえはリリース済みです");
    renderAdjustments();
    await refreshGrid();
  } catch (e) {
    toast("確定処理に失敗: " + e.message);
  }
}

async function cancelAdj(adj) {
  try {
    for (const c of adj.candidates) {
      await api(`/calendars/${encodeURIComponent(adj.calendarId)}/events/${c.eventId}`, { method: "DELETE" }).catch(() => {});
    }
    saveAdj(loadAdj().filter((a) => a.id !== adj.id));
    toast("仮押さえを削除しました");
    renderAdjustments();
    await refreshGrid();
  } catch (e) {
    toast("削除に失敗: " + e.message);
  }
}

/* ---------- UIユーティリティ ---------- */
document.querySelectorAll(".tab").forEach((tab) =>
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
    tab.classList.add("active");
    $("view-pick").hidden = tab.dataset.view !== "pick";
    $("view-list").hidden = tab.dataset.view !== "list";
  })
);
$("prevWeek").addEventListener("click", async () => { weekOffset--; await refreshGrid(); });
$("nextWeek").addEventListener("click", async () => { weekOffset++; await refreshGrid(); });
$("calendarSelect").addEventListener("change", async () => { picked = []; refreshPickedUI(); await refreshGrid(); });
$("copyBtn").addEventListener("click", async () => { await navigator.clipboard.writeText($("mailText").value); toast("コピーしました"); });
$("closeModal").addEventListener("click", () => { $("textModal").hidden = true; });

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}
const youbiJ = ["日", "月", "火", "水", "木", "金", "土"];
const fmtLong = (d) => `${d.getMonth() + 1}月${d.getDate()}日(${youbiJ[d.getDay()]}) ${fmtTime(d)}`;
const fmtTime = (d) => `${d.getHours()}:${String(d.getMinutes()).padStart(2, "0")}`;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.hidden = false;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => (t.hidden = true), 2600);
}
</script>
